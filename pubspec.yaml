name: pdh
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  firebase_core: ^4.1.1 # Updated to a compatible version
  firebase_auth: ^6.1.0 # Updated to a compatible version
  cloud_firestore: ^6.0.2
  flutter_speed_dial: ^7.0.0
  google_sign_in: ^7.2.0
  logger: ^2.0.2
  flutter_facebook_auth: ^7.1.2
  percent_indicator: ^4.2.5
  firebase_ml_model_downloader: ^0.4.0+2 # For AI model downloading
  tflite_flutter: ^0.11.0 # For running TensorFlow Lite models
  firebase_ai: ^3.3.0
  video_player: ^2.10.0
  shared_preferences: ^2.2.3 # Updated to latest version for state persistence
  image_picker: ^1.2.0
  firebase_storage: ^13.0.2
  file_picker: ^8.0.3
  flutter_tts: ^4.2.3
  speech_to_text: ^7.3.0
  js: ^0.6.7 # Added for Dart-JavaScript interop
  web: ^1.1.1 # Added for modern web interop

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/Account_User_Profile/
    - assets/Innovation_Brainstorm/
    - assets/Approved_Tick/
    - assets/Brand/
    - assets/fonts/poppins/
    - assets/Send_Paper Plane/
    - assets/videos/
    - assets/1.Audio_Sound.png 
    - assets/Goal_Target/ 
    - assets/Approved_Tick/Approved_White_Badge_Red.png
    - assets/Process_Flows_Automation/
    - assets/Business_Growth_Development/
    - assets/Email_Notification/
    - assets/Task_Management/
    - assets/Calendar_Date_Picker/
    - assets/Information_Detail/
    - assets/Project_Direction_Acceleration/
    - assets/Like_Thumbs_Up/
    - assets/Office_Workplace/
    - assets/Internet_Web_Browser/
    - assets/Khonodemy Icons/









  fonts:
