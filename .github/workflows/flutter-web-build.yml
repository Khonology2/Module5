# Builds Flutter web with OpenRouter keys baked in via --dart-define
# (matches lib/main.dart _openRouterDefineOverrides + AppAiService).
#
# After a successful build on any branch except `nathi-v3`, opens (or reuses) a PR
# into `nathi-v3` and enables auto-merge when the repo allows it. Merging to `nathi-v3`
# should trigger your deploy-check workflow if it is configured with:
#   on: push: branches: [nathi-v3]
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   OPENROUTER_API_KEY_PRIMARY   (required)
#   OPENROUTER_API_KEY_SECONDARY (optional)
#   OPENROUTER_MODEL             (optional; app defaults if omitted)
#   ACTIONS_CREATE_PR_PAT        (optional; see PR job below)
#
# PR creation: if `gh pr create` fails with "GitHub Actions is not permitted to create or approve pull requests":
#   (A) Repo/org: Settings → Actions → General → Workflow permissions → enable
#       **Allow GitHub Actions to create and approve pull requests** (then the default token works), OR
#   (B) Create a **classic PAT** (`repo`) or **fine-grained PAT** (Contents + Pull requests write for this repo),
#       store it as secret **ACTIONS_CREATE_PR_PAT** — this workflow uses it only for `gh pr` / auto-merge.
#
# Repo settings: enable "Allow auto-merge" and branch protection on `nathi-v3` for
# auto-merge to take effect after PR checks pass.

name: Flutter Web Build

on:
  push:
    branches-ignore:
      - nathi-v3
  workflow_dispatch:

concurrency:
  group: flutter-web-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build web
        env:
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
        run: |
          set -euo pipefail
          ARGS=(flutter build web --release --base-href /)
          if [ -n "${BACKEND_BASE_URL:-}" ]; then
            ARGS+=(--dart-define=BACKEND_BASE_URL="${BACKEND_BASE_URL}")
          fi
          "${ARGS[@]}"

      - name: Upload web bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          if-no-files-found: error

  # Open PR into nathi-v3 so merges land on the deploy branch (triggers deploy-check, etc.).
  open-pr-to-nathi-v3:
    needs: build-web
    if: success() && github.ref != 'refs/heads/nathi-v3' && !startsWith(github.ref, 'refs/heads/dependabot/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Create or reuse PR and enable auto-merge
        env:
          ACTIONS_CREATE_PR_PAT: ${{ secrets.ACTIONS_CREATE_PR_PAT }}
          # Ensure bound for `set -u` (some runners do not expose GITHUB_TOKEN to the shell unless declared).
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -n "${ACTIONS_CREATE_PR_PAT:-}" ]; then
            export GH_TOKEN="${ACTIONS_CREATE_PR_PAT}"
            echo "::notice::Using secret ACTIONS_CREATE_PR_PAT for GitHub CLI (required when the org blocks GITHUB_TOKEN from opening PRs)."
          else
            export GH_TOKEN="${GITHUB_TOKEN}"
            echo "::notice::Using default GITHUB_TOKEN for gh. If PR creation fails, add ACTIONS_CREATE_PR_PAT or enable Actions PR permission in repo/org settings."
          fi

          REPO="${{ github.repository }}"
          BRANCH="${GITHUB_REF_NAME}"
          BASE="nathi-v3"

          if ! gh api "repos/${REPO}/branches/${BASE}" >/dev/null 2>&1; then
            echo "::warning::Base branch '${BASE}' does not exist on origin yet; skipping PR."
            exit 0
          fi

          EXISTING="$(gh pr list --repo "${REPO}" --base "${BASE}" --head "${BRANCH}" --state open --json number --jq '.[0].number // empty')"
          if [ -n "${EXISTING}" ]; then
            echo "::notice::Using existing open PR #${EXISTING} (${BRANCH} → ${BASE})."
            PR_NUMBER="${EXISTING}"
          else
            BODY="$(mktemp)"
            {
              echo "Automated pull request: **Flutter Web Build** succeeded for \`${BRANCH}\`."
              echo ""
              echo "- Base: \`${BASE}\`"
              echo "- Head: \`${BRANCH}\`"
              echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              echo ""
              echo "After merge, any workflow with \`on: push: branches: ['${BASE}']\` (for example **deploy-check**) runs on the new tip of \`${BASE}\`."
              echo ""
              echo "Auto-merge is requested when the repository allows it (Settings → General → **Allow auto-merge**; branch protection on \`${BASE}\`)."
            } >"${BODY}"
            gh pr create --repo "${REPO}" --base "${BASE}" --head "${BRANCH}" \
              --title "chore(ci): web build passed — merge ${BRANCH} into ${BASE}" \
              --body-file "${BODY}"
            rm -f "${BODY}"
            PR_NUMBER="$(gh pr list --repo "${REPO}" --base "${BASE}" --head "${BRANCH}" --state open --json number --jq '.[0].number')"
          fi

          if [ -z "${PR_NUMBER}" ]; then
            echo "::error::Could not determine PR number after create/list."
            exit 1
          fi

          if gh pr merge "${PR_NUMBER}" --repo "${REPO}" --auto --merge; then
            echo "::notice::Auto-merge enabled for PR #${PR_NUMBER} (will merge when branch rules and checks pass)."
          else
            echo "::notice::Auto-merge could not be enabled for PR #${PR_NUMBER}. Merge manually or enable Allow auto-merge + branch protection."
          fi
