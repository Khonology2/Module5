name: Generate Daily Commits

on:
  push:
    branches: ['*'] # Include ALL branches, including new ones created by developers
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write # Allow the workflow to push commits back to the repository

jobs:
  generate-commits:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch all history for complete commit log

    - name: Setup Python for merge check
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Set up Git user
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Check for merge conflicts
      run: |
        # Skip merge check for MAIN branch (it's the target)
        if [[ "${{ github.ref_name }}" == "MAIN" ]]; then
          echo "Skipping merge check for MAIN branch (target branch)"
        else
          chmod +x .github/scripts/merge_check.py
          python .github/scripts/merge_check.py
        fi

    - name: Setup Node.js for commit processing
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Generate daily commits JSON
      run: |
        # Get today's date in YYYY-MM-DD format
        TODAY=$(date -u +"%Y-%m-%d")
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        # Initialize previous commits as empty array
        PREVIOUS_COMMITS="[]"
        
        # Read existing daily-commits.json if it exists and has commits
        if [ -f "assets/data/daily-commits.json" ]; then
          if command -v jq &> /dev/null && jq -e '.commits | length > 0' assets/data/daily-commits.json &>/dev/null; then
            PREVIOUS_COMMITS=$(jq '.commits' assets/data/daily-commits.json)
          fi
        fi

        # Get commits from today only and format as proper JSON array using jq
        TODAY_COMMITS_JSON=$(git log --since="${TODAY}T00:00:00Z" --pretty=format:'%an|%s|%aI' --no-merges | \
          jq -R -s '
            split("\n") |
            map(select(length > 0)) |
            map(split("|") | {author: .[0], message: .[1], timestamp: .[2]}) |
            map(.author |= (if . == "Nathi" then "Nathi2266" elif . == "Lihle" then "creator745" elif . == "Sipho" then "BhutSipho" else . end))
          ')

        # Count today's commits
        TODAY_COMMIT_COUNT=$(git log --since="${TODAY}T00:00:00Z" --oneline --no-merges | wc -l)

        # Merge today's commits with previous commits
        # Keep previous commits for authors who didn't push today, replace with today's commit for those who did
        MERGED_COMMITS=$(jq -n \
          --argjson previous "$PREVIOUS_COMMITS" \
          --argjson today "$TODAY_COMMITS_JSON" \
          '
          # Create a map of today'\''s commits by author
          def today_authors: $today | map(.author) | unique;
          
          # Filter out previous commits for authors who pushed today, then add today'\''s commits
          ($previous | map(select(.author as $a | today_authors | index($a) | not))) + $today
          ')

        # Count total commits (merged)
        TOTAL_COMMIT_COUNT=$(echo "$MERGED_COMMITS" | jq 'length')

        # Calculate week of month based on calendar weeks (Monday-Sunday)
        # Find the first Monday of the month
        YEAR=$(date -u +"%Y")
        MONTH=$(date -u +"%m")
        DAY=$(date -u +"%d")
        
        # Get the weekday of the 1st of the month (1=Monday, 7=Sunday)
        FIRST_DAY_WEEKDAY=$(date -u -d "${YEAR}-${MONTH}-01" +"%u")
        
        # Calculate offset to get to the previous Monday
        # If 1st is Monday (1), offset = 0
        # If 1st is Tuesday (2), offset = 1, etc.
        OFFSET_TO_MONDAY=$(((FIRST_DAY_WEEKDAY - 1) % 7))
        
        # Calculate days since the first Monday of the month
        DAYS_SINCE_FIRST_MONDAY=$((DAY + OFFSET_TO_MONDAY - 1))
        
        # Calculate week number (1-based)
        WEEK_OF_MONTH=$(((DAYS_SINCE_FIRST_MONDAY / 7) + 1))
        
        # Map week number to letter (A=1, B=2, C=3, D=4, E=5)
        case $WEEK_OF_MONTH in
          1) WEEK_LETTER="A" ;;
          2) WEEK_LETTER="B" ;;
          3) WEEK_LETTER="C" ;;
          4) WEEK_LETTER="D" ;;
          5) WEEK_LETTER="E" ;;
          *) WEEK_LETTER="A" ;; # Fallback
        esac
        
        # Get day of week number (1=Monday, 7=Sunday)
        DAY_OF_WEEK_NUM=$(date -u +"%u")
        
        # Map day number to letter (A=1 Monday, B=2 Tuesday, ..., E=5 Friday)
        case $DAY_OF_WEEK_NUM in
          1) DAY_LETTER="A" ;;
          2) DAY_LETTER="B" ;;
          3) DAY_LETTER="C" ;;
          4) DAY_LETTER="D" ;;
          5) DAY_LETTER="E" ;;
          6) DAY_LETTER="F" ;; # Saturday
          7) DAY_LETTER="G" ;; # Sunday
        esac
        
        VERSION="${YEAR}.${MONTH}.${WEEK_LETTER}${DAY_LETTER}${TOTAL_COMMIT_COUNT}.SIT"

        # Create the JSON structure using jq for proper formatting
        jq -n \
          --arg version "$VERSION" \
          --arg generated_at "$TIMESTAMP" \
          --argjson commits "$MERGED_COMMITS" \
          --arg total_commits "$TOTAL_COMMIT_COUNT" \
          --arg date_range "$TODAY" \
          '{
            version: $version,
            generated_at: $generated_at,
            commits: $commits,
            total_commits: ($total_commits | tonumber),
            date_range: $date_range
          }' > assets/data/daily-commits.json

        echo "Generated merged commit data for $TODAY with $TOTAL_COMMIT_COUNT total commits ($TODAY_COMMIT_COUNT from today)"

    - name: Verify JSON is valid
      run: |
        if command -v jq &> /dev/null; then
          jq . assets/data/daily-commits.json
          echo "JSON is valid"
        else
          echo "jq not available, skipping validation"
        fi

    - name: Display generated data
      run: |
        echo "Generated commit data:"
        cat assets/data/daily-commits.json | jq . 2>/dev/null || cat assets/data/daily-commits.json

    - name: Commit and push changes (if any)
      run: |
        # Check if there are changes to commit
        if git diff --quiet assets/data/daily-commits.json; then
          echo "No changes to commit data"
        else
          echo "Committing updated commit data"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/data/daily-commits.json
          git commit -m "Update daily commits data [${TODAY}]" || echo "No changes to commit"
          git push || echo "Push failed - likely due to no changes or permissions"
        fi
