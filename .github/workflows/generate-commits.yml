name: Generate Daily Commits

on:
  push:
    branches: ['*'] # Include ALL branches, including new ones created by developers
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-commits:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch all history for complete commit log

    - name: Setup Node.js for commit processing
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Generate daily commits JSON
      run: |
        # Get today's date in YYYY-MM-DD format
        TODAY=$(date -u +"%Y-%m-%d")
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        # Create author mapping (git name -> GitHub username)
        declare -A AUTHOR_MAP=(
          ["Nathi"]="Nathi2266"
          ["Lihle"]="creator745"
          ["Sipho"]="BhutSipho"
          # Add more mappings as needed
        )

        # Get commits from today only and format as JSON
        COMMITS_JSON=$(git log --since="${TODAY}T00:00:00Z" --pretty=format:'{"author": "%an", "message": "%s", "timestamp": "%aI"}' --no-merges | \
        # Map git author names to GitHub usernames
        while IFS= read -r line; do
          # Extract author from JSON line
          author=$(echo "$line" | sed -n 's/.*"author": "\([^"]*\)".*/\1/p')
          
          # Map to GitHub username if exists
          github_username="${AUTHOR_MAP[$author]:-$author}"
          
          # Replace author in JSON
          echo "$line" | sed "s/\"author\": \"$author\"/\"author\": \"$github_username\"/"
        done | \
        # Format each commit as JSON object
        sed 's/}/},/g' | \
        # Remove trailing comma from last item
        sed '$ s/,$//' | \
        # Wrap in array
        sed '1s/^/[/; $s/$/]/')

        # Count commits
        COMMIT_COUNT=$(git log --since="${TODAY}T00:00:00Z" --oneline --no-merges | wc -l)

        # If no commits today, create empty array
        if [ "$COMMIT_COUNT" -eq 0 ]; then
          COMMITS_JSON="[]"
          COMMIT_COUNT=0
        fi

        # Get current version from pubspec.yaml (fallback if not found)
        VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//' | tr -d ' ' || echo "2026.02.DD1_SIT")

        # Create the JSON structure
        cat > assets/data/daily-commits.json << EOF
        {
          "version": "$VERSION",
          "generated_at": "$TIMESTAMP",
          "commits": $COMMITS_JSON,
          "total_commits": $COMMIT_COUNT,
          "date_range": "$TODAY"
        }
        EOF

        echo "Generated commit data for $TODAY with $COMMIT_COUNT commits"

    - name: Verify JSON is valid
      run: |
        if command -v jq &> /dev/null; then
          jq . assets/data/daily-commits.json
          echo "JSON is valid"
        else
          echo "jq not available, skipping validation"
        fi

    - name: Display generated data
      run: |
        echo "Generated commit data:"
        cat assets/data/daily-commits.json | jq . 2>/dev/null || cat assets/data/daily-commits.json

    - name: Commit and push changes (if any)
      run: |
        # Check if there are changes to commit
        if git diff --quiet assets/data/daily-commits.json; then
          echo "No changes to commit data"
        else
          echo "Committing updated commit data"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/data/daily-commits.json
          git commit -m "Update daily commits data [${TODAY}]" || echo "No changes to commit"
          git push || echo "Push failed - likely due to no changes or permissions"
        fi
