name: Generate Daily Commits

on:
  push:
    branches:
      - deployed-v2
  schedule:
    # Run daily at 4:30 PM UTC (2:30 PM SAST, 6:30 AM PST)
    - cron: '30 16 * * *'
  workflow_dispatch:

# Avoid duplicate runs when this workflow pushes [skip ci] back to the repo
concurrency:
  group: generate-commits-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

env:
  TARGET_DEPLOY_BRANCH: deployed-v2

jobs:
  generate-commits:
    runs-on: ubuntu-latest
    # Skip only when this push was our own bot commit (prevents infinite push loops)
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message || '', '[skip ci]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_DEPLOY_BRANCH }}
          fetch-depth: 0

      - name: Sync deploy branch tip
        run: |
          set -euo pipefail
          git fetch origin "${TARGET_DEPLOY_BRANCH}"
          git checkout "${TARGET_DEPLOY_BRANCH}"
          git reset --hard "origin/${TARGET_DEPLOY_BRANCH}"

      - name: Setup Node.js for commit processing
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate daily commits JSON and job summary
        run: |
          set -euo pipefail

          TODAY=$(date -u +"%Y-%m-%d")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          COMMITS_JSON=$(git log --since="${TODAY}T00:00:00Z" --pretty=format:'%an|%s|%aI' --no-merges | \
            jq -R -s '
              split("\n") |
              map(select(length > 0)) |
              map(split("|") | {author: .[0], message: .[1], timestamp: .[2]})
            ')

          COMMIT_COUNT=$(git log --since="${TODAY}T00:00:00Z" --oneline --no-merges | wc -l)
          COMMIT_COUNT=$(echo "$COMMIT_COUNT" | tr -d ' ')

          if [ "$COMMIT_COUNT" -eq 0 ]; then
            COMMITS_JSON="[]"
            COMMIT_COUNT=0
          fi

          YEAR=$(date -u +"%Y")
          MONTH=$(date -u +"%m")
          DAY=$(date -u +"%d")

          WEEK_OF_MONTH=$(( (10#$DAY - 1) / 7 + 1 ))
          WEEK_LETTER=$(echo "ABCD" | cut -c$(( (WEEK_OF_MONTH - 1) % 4 + 1 )))

          VERSION="${YEAR}.${MONTH}.${WEEK_LETTER}B${COMMIT_COUNT}.SIT"

          jq -n \
            --arg version "$VERSION" \
            --arg generated_at "$TIMESTAMP" \
            --argjson commits "$COMMITS_JSON" \
            --arg total_commits "$COMMIT_COUNT" \
            --arg date_range "$TODAY" \
            '{
              version: $version,
              generated_at: $generated_at,
              commits: $commits,
              total_commits: ($total_commits | tonumber),
              date_range: $date_range
            }' > assets/data/daily-commits.json

          echo "Generated commit data for $TODAY with $COMMIT_COUNT commits"

          # --- Feature commit / commits since last feat (conventional commits) ---
          HEAD_SUBJECT=$(git log -1 --pretty=%s)
          if echo "$HEAD_SUBJECT" | grep -qiE '^feat(\([^)]+\))?:'; then
            FEATURE_COMMIT=true
          else
            FEATURE_COMMIT=false
          fi

          LAST_FEAT_SHA=$(git log -1 --extended-regexp --grep='^feat(\([^)]+\))?:' --format=%H 2>/dev/null || true)
          if [ -z "$LAST_FEAT_SHA" ]; then
            LAST_FEAT_SHA=$(git log -1 --grep='^feat' --format=%H 2>/dev/null || true)
          fi

          if [ -n "$LAST_FEAT_SHA" ]; then
            COMMITS_SINCE_FEATURE=$(git rev-list --count "${LAST_FEAT_SHA}..HEAD" 2>/dev/null || echo "0")
          else
            COMMITS_SINCE_FEATURE=$(git rev-list --count HEAD 2>/dev/null || echo "0")
          fi

          # Short label for summary (matches common display: YYYY.MM.<week+build> without .SIT)
          VERSION_SHORT="${YEAR}.${MONTH}.${WEEK_LETTER}B${COMMIT_COUNT}"

          {
            echo "## update-version summary"
            echo ""
            echo "### Version Control Update"
            echo ""
            echo "- **Version:** \`${VERSION_SHORT}\`"
            echo "- **Full version string:** \`${VERSION}\`"
            echo "- **Branch:** \`${TARGET_DEPLOY_BRANCH}\`"
            echo "- **Feature commit:** ${FEATURE_COMMIT}"
            echo "- **Commits since feature:** ${COMMITS_SINCE_FEATURE}"
            echo "- **Commits today (UTC):** ${COMMIT_COUNT}"
            echo ""
            echo "_Job summary generated at run-time._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify JSON is valid
        run: |
          jq . assets/data/daily-commits.json
          echo "JSON is valid"

      - name: Display generated data
        run: |
          echo "Generated commit data:"
          jq . assets/data/daily-commits.json

      - name: Commit and push changes (if any)
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          if git diff --quiet assets/data/daily-commits.json; then
            echo "No changes to commit data"
          else
            echo "Committing updated commit data"
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add assets/data/daily-commits.json
            git commit -m "chore: update daily commits data [${TODAY}] [skip ci]" || echo "No changes to commit"
            git pull --rebase origin "${TARGET_DEPLOY_BRANCH}" || git pull origin "${TARGET_DEPLOY_BRANCH}" || echo "Pull failed, attempting push anyway"
            git push origin "HEAD:${TARGET_DEPLOY_BRANCH}" || echo "Push failed - likely due to no changes or permissions"
          fi

  deploy-after-generate:
    name: Deploy after commits update
    needs: generate-commits
    uses: ./.github/workflows/deploy.yml
    with:
      deploy_branch: deployed-v2
    secrets: inherit

