name: Merge Conflict Tracking

on:
  push:
    branches-ignore:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  merge-conflict-check:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Configure Git
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"

    - name: Fetch all branches
      run: git fetch origin

    - name: Run Merge Conflict Script
      id: merge_check
      run: python .github/scripts/merge_check.py

    - name: Show JSON Report
      run: cat assets/data/merge-conflicts.json

    - name: Commit and Push Report
      run: |
        echo "Checking for merge conflict report changes..."
        if git diff --quiet assets/data/merge-conflicts.json 2>/dev/null; then
          echo "ℹ️  No merge conflict report changes detected"
        else
          echo "📝 Committing merge conflict report..."
          git add assets/data/merge-conflicts.json
          git commit -m "docs: merge conflict report for ${GITHUB_REF_NAME} [skip ci]"
          echo "🚀 Pushing report to branch: ${GITHUB_REF_NAME}"
          if git push origin ${GITHUB_REF_NAME}; then
            echo "✅ Report successfully committed and pushed"
            echo "🔗 Developers can now pull this branch to see conflict report locally"
          else
            echo "⚠️  Push failed - report saved locally in runner only"
          fi
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: merge-conflict-report
        path: assets/data/merge-conflicts.json

    - name: Fail if conflicts exist
      if: failure()
      run: exit 1
