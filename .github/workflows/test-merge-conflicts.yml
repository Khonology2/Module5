name: Test Merge Conflicts

on:
  push:
    branches: ['*'] # Include ALL branches, including new ones created by developers
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read # Only need read access for conflict testing

jobs:
  test-merge-conflicts:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch all history for complete commit log

    - name: Setup Python for merge check
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Set up Git user
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Check for merge conflicts
      run: |
        # Skip merge check for MAIN branch (it's the target)
        if [[ "${{ github.ref_name }}" == "MAIN" ]]; then
          echo "Skipping merge check for MAIN branch (target branch)"
        else
          chmod +x .github/scripts/merge_check.py
          python .github/scripts/merge_check.py
        fi
