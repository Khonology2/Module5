name: Test Merge Conflicts

on:
  push:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-conflict-check:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0


    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'


    - name: Configure Git
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"


    - name: Run Merge Conflict Detection
      id: conflict_check
      run: |

        chmod +x .github/scripts/merge_check.py

        python .github/scripts/merge_check.py


    - name: Show JSON report
      run: |

        echo "------ MERGE REPORT ------"

        cat assets/data/merge-conflicts.json


    - name: Commit and Push Report
      run: |

        git add assets/data/merge-conflicts.json

        git diff --staged --quiet || git commit -m "Auto update merge conflict report"

        git push


    - name: Fail if conflicts exist
      if: steps.conflict_check.outputs.conflicts_found == 'true'
      run: |

        echo "Merge conflicts detected"

        exit 1
