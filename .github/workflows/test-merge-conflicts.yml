name: Test Merge Conflicts

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-conflict-check:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0


    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'


    - name: Configure Git
      run: |
        # Get the author of the last commit (the actual developer)
        AUTHOR_EMAIL=$(git log -1 --pretty=format:'%ae')
        AUTHOR_NAME=$(git log -1 --pretty=format:'%an')
        
        git config --global user.name "$AUTHOR_NAME"
        git config --global user.email "$AUTHOR_EMAIL"


    - name: Run Merge Conflict Detection
      id: conflict_check
      run: |

        chmod +x .github/scripts/merge_check.py

        python .github/scripts/merge_check.py


    - name: Show JSON report
      run: |

        echo "------ MERGE REPORT ------"

        cat assets/data/merge-conflicts.json


    - name: Commit and Push Report
      run: |
        
        git add assets/data/merge-conflicts.json
        
        # Commit with developer attribution
        git diff --staged --quiet || git commit -m "Auto update merge conflict report [ci skip]"

        git push


    - name: Fail if conflicts exist
      if: steps.conflict_check.outputs.conflicts_found == 'true'
      run: |

        echo "Merge conflicts detected"

        exit 1
