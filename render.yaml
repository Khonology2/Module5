services:
  - type: web
    name: pdh-backend
    env: python              # ✅ NOT "runtime"
    rootDir: backend

    buildCommand: pip install --upgrade pip && pip install --only-binary=:all: -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000

    plan: free

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9